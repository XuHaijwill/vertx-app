# ============================================================
# application-DEV.yml — 开发环境
# 激活方式: set APP_ENV=DEV 或系统变量 APP_ENV=DEV
# ============================================================
app:
  http-port: 8881

db:
  host: 192.168.60.134
  port: 5432
  database: vertx
  user: postgres
  password: 123456
  pool-size: 10
  ssl: false

# DEV 环境 Keycloak 配置
auth:
  enabled: true
  realm: myrealm
  auth-server-url: http://192.168.60.134:8080
  client-id: vertx-app
  audience: vertx-app
  public-client: true
  default-roles: user

# Token 缓存配置 (Ehcache)
cache:
  token:
    enabled: true           # 是否启用 token 缓存
    max-size: 10000         # 最大缓存条目数
    default-ttl-minutes: 60 # 默认 TTL（分钟），实际使用 JWT exp 过期时间
