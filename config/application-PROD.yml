# ============================================================
# application-PROD.yml — 生产环境
# 激活方式: set APP_ENV=PROD
# ============================================================

app:
  http-port: 80

db:
  host: prod-db.example.com
  port: 5432
  database: vertx_prod
  user: prod_user
  password: ${DB_PASSWORD}
  pool-size: 50
  ssl: true

# PROD 环境 Keycloak 配置
auth:
  enabled: true
  realm: prod
  auth-server-url: http://192.168.60.134:8080
  client-id: vertx-app
  audience: vertx-app
  public-client: true
  default-roles: user
