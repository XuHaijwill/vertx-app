# ============================================================
# application-UAT.yml — UAT 环境
# 激活方式: set APP_ENV=UAT
# ============================================================

app:
  http-port: 8889

db:
  host: uat-db.example.com
  port: 5432
  database: vertx_uat
  user: uat_user
  password: uat_password
  pool-size: 20
  ssl: true

# UAT 环境 Keycloak 配置
auth:
  enabled: true
  realm: uat
  auth-server-url: http://192.168.60.134:8080
  client-id: vertx-app
  audience: vertx-app
  public-client: true
  default-roles: user
