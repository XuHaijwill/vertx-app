openapi: 3.0.3
info:
  title: My Vert.x REST API
  description: |
    A reactive, enterprise-grade REST API built with Eclipse Vert.x 5.x
    
    ## Features
    - **RESTful API** - Clean, structured endpoints
    - **PostgreSQL** - Reactive database operations
    - **Health Checks** - Kubernetes-ready probes
    - **Swagger UI** - Interactive API documentation
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8888
    description: Local development server

tags:
  - name: Health
    description: Health check endpoints
  - name: Users
    description: User management operations
  - name: Products
    description: Product management operations
  - name: ScheduledTasks
    description: Scheduled task management operations
  - name: Batch
    description: High-performance batch operations
  - name: Orders
    description: Order management with multi-table transactions
  - name: Payments
    description: Payment processing with 5-table ACID transactions
  - name: SysConfig
    description: System configuration management operations
  - name: SysDictType
    description: Dictionary type management operations
  - name: SysDictData
    description: Dictionary data management operations
  - name: SysMenu
    description: Menu permission management operations
  - name: Auth
    description: Authentication and authorization endpoints

paths:
  # ================================================================
  # AUTH ENDPOINTS
  # ================================================================
  /api/auth/config:
    get:
      tags:
        - Auth
      summary: Get Keycloak client config
      description: Returns public Keycloak configuration for frontend initialization (no secrets exposed)
      operationId: getAuthConfig
      responses:
        '200':
          description: Keycloak public configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: success
                data:
                  enabled: true
                  realm: myrealm
                  clientId: vertx-app
                  authServerUrl: http://localhost:8180

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      description: Returns the current authenticated user info extracted from the JWT Bearer token
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: success
                data:
                  authenticated: true
                  username: john.doe
                  roles:
                    - user
                    - realm:user
                  email: john@example.com
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Get logout URL
      description: Returns the Keycloak logout URL for the frontend to redirect to
      operationId: authLogout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                redirect_uri:
                  type: string
                  description: URL to redirect after logout
                  example: http://localhost:3000
      responses:
        '200':
          description: Logout URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ================================================================
  # HEALTH ENDPOINTS
  # ================================================================
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the full health status of the application
      operationId: getHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                code: success
                message: Operation successful
                data:
                  status: UP
                  service: my-vertx-app
                  version: 1.0.0
                  timestamp: 1714112345678
                  uptime: 5m 32s
                  memory:
                    total: 512MB
                    used: 234MB
                    free: 278MB
                    percentage: 45.7%

  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Kubernetes liveness probe - returns OK if the application is running
      operationId: getLiveness
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: OK

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Kubernetes readiness probe - returns READY if the application is ready to serve traffic
      operationId: getReadiness
      responses:
        '200':
          description: Readiness status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: success
                data:
                  status: READY

  # ================================================================
  # USER ENDPOINTS
  # ================================================================
  /api/users:
    get:
      tags:
        - Users
      summary: List all users
      description: Returns a list of all users in the system
      operationId: listUsers
      parameters:
        - name: q
          in: query
          description: Search keyword (searches name, email, department)
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponse'
              example:
                code: success
                message: Operation successful
                data:
                  - id: 1
                    name: Alice
                    email: alice@example.com
                    age: 28
                    department: Engineering
                    status: active
                    created_at: "2026-04-26T00:00:00Z"
                  - id: 2
                    name: Bob
                    email: bob@example.com
                    age: 32
                    department: Product
                    status: active
                    created_at: "2026-04-26T00:00:00Z"
    post:
      tags:
        - Users
      summary: Create a new user
      description: Creates a new user with the provided information
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              name: John Doe
              email: john@example.com
              age: 30
              department: Engineering
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Returns a single user by their ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Users
      summary: Update user
      description: Updates an existing user with the provided information
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              name: Alice Smith
              age: 29
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Users
      summary: Delete user
      description: Deletes a user by their ID
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /api/users/batch:
    post:
      tags:
        - Users
      summary: Batch create users
      description: Creates multiple users in a single request (max 100 items)
      operationId: batchCreateUsers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchCreateUsersRequest'
      responses:
        '201':
          description: Users created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
    put:
      tags:
        - Users
      summary: Batch update users
      description: Updates multiple users in a single request (max 100 items)
      operationId: batchUpdateUsers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUpdateUsersRequest'
      responses:
        '200':
          description: Users updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
    delete:
      tags:
        - Users
      summary: Batch delete users
      description: Deletes multiple users by IDs (max 100 items)
      operationId: batchDeleteUsers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteRequest'
      responses:
        '200':
          description: Users deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResponse'
  # ================================================================
  # PRODUCT ENDPOINTS
  # ================================================================
  /api/products:
    get:
      tags:
        - Products
      summary: List all products
      description: Returns a list of all products
      operationId: listProducts
      parameters:
        - name: q
          in: query
          description: Search keyword
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsResponse'
              example:
                code: success
                data:
                  - id: 1
                    name: iPhone 15
                    category: Electronics
                    price: 799.99
                    stock: 100
                    status: active
                    description: Apple smartphone
                  - id: 2
                    name: MacBook Pro
                    category: Electronics
                    price: 1999.99
                    stock: 50
                    status: active
                    description: Apple laptop
    post:
      tags:
        - Products
      summary: Create a new product
      description: Creates a new product with the provided information
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            example:
              name: iPad Pro
              category: Electronics
              price: 999.99
              stock: 75
              description: Apple tablet
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Products
      summary: Update product
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Products
      summary: Delete product
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /api/products/batch:
    post:
      tags:
        - Products
      summary: Batch create products
      description: Creates multiple products in a single request (max 100 items)
      operationId: batchCreateProducts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchCreateProductsRequest'
      responses:
        '201':
          description: Products created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
    put:
      tags:
        - Products
      summary: Batch update products
      description: Updates multiple products in a single request (max 100 items)
      operationId: batchUpdateProducts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUpdateProductsRequest'
      responses:
        '200':
          description: Products updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
    delete:
      tags:
        - Products
      summary: Batch delete products
      description: Deletes multiple products by IDs (max 100 items)
      operationId: batchDeleteProducts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteRequest'
      responses:
        '200':
          description: Products deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResponse'
  # ================================================================
  # ORDER ENDPOINTS
  # ================================================================
  /api/orders:
    get:
      tags:
        - Orders
      summary: List orders
      description: Returns a paginated list of all orders
      operationId: listOrders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersResponse'
    post:
      tags:
        - Orders
      summary: Create a new order
      description: |
        Creates a new order with multiple items — all-or-nothing transaction.
        Within one transaction: validates user, inserts order, inserts items, deducts stock.
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              userId: 1
              remark: "Please ship ASAP"
              items:
                - productId: 1
                  quantity: 2
                  price: 99.9
                - productId: 3
                  quantity: 1
                  price: 49.9
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
              example:
                code: success
                data:
                  id: 42
                  userId: 1
                  total: 249.7
                  remark: "Please ship ASAP"
                  status: pending
                  itemCount: 2
        '400':
          description: Validation error (missing userId, empty items, invalid quantity)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Returns a single order by its ID
      operationId: getOrderById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{id}/cancel:
    put:
      tags:
        - Orders
      summary: Cancel order
      description: |
        Cancels an order and restores stock — all-or-nothing transaction.
        Only pending or paid orders can be cancelled. Completed orders cannot be cancelled.
        Uses SELECT ... FOR UPDATE inside the transaction to prevent TOCTOU race conditions.
      operationId: cancelOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                code: success
                data:
                  id: 42
                  userId: 1
                  total: "249.70"
                  status: cancelled
        '409':
          description: Order already cancelled or cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: CONFLICT
                message: Order already cancelled
        '400':
          description: Cannot cancel order in current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/user/{userId}:
    get:
      tags:
        - Orders
      summary: Get orders by user ID
      description: Returns all orders placed by a specific user
      operationId: listOrdersByUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersResponse'

  # ================================================================
  # PAYMENT ENDPOINTS
  # ================================================================
  /api/payments/pay:
    post:
      tags:
        - Payments
      summary: Process payment for an order
      description: |
        Processes payment for an order — 5-table ACID transaction.
        Idempotent: if the order already has a completed payment, returns the existing record.
        Supports methods: balance, card, alipay, wechat
      operationId: processPayment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessPaymentRequest'
            example:
              orderId: 42
              method: balance
      responses:
        '201':
          description: Payment processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
              example:
                code: success
                data:
                  id: 7
                  orderId: 42
                  userId: 1
                  amount: "249.70"
                  method: balance
                  status: completed
                  completedAt: "2026-04-30T09:30:00"
                  orderTotal: "249.70"
                  orderStatus: completed
                  userName: John Doe
                  _idempotent: false
        '400':
          description: Validation error or cannot pay cancelled order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Order already paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/{id}/refund:
    post:
      tags:
        - Payments
      summary: Refund a payment
      description: |
        Refunds a completed payment — 4-table ACID transaction.
        Restores user balance, updates payment and order status.
        Idempotent: returns existing refund if already processed.
      operationId: refundPayment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment refunded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Can only refund completed payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments:
    get:
      tags:
        - Payments
      summary: List payments by status
      description: |
        Returns payments filtered by status. Default is pending.
        Common statuses: pending, completed, failed, refunded
      operationId: listPayments
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by payment status
          required: false
          schema:
            type: string
            enum: [pending, completed, failed, refunded]
            default: pending
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentsResponse'

  /api/payments/{id}:
    get:
      tags:
        - Payments
      summary: Get payment by ID
      description: Returns a single payment by its ID
      operationId: getPaymentById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/order/{orderId}:
    get:
      tags:
        - Payments
      summary: Get payment by order ID
      description: Returns the payment record for a specific order
      operationId: getPaymentByOrderId
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          description: Order ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          description: No payment found for this order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/user/{userId}:
    get:
      tags:
        - Payments
      summary: Get payments by user ID
      description: Returns all payments made by a specific user
      operationId: listPaymentsByUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentsResponse'

  # ================================================================
  # SYS_CONFIG ENDPOINTS
  # ================================================================
  /api/sys-configs:
    get:
      tags:
        - SysConfig
      summary: List system configurations
      description: |
        Returns a paginated list of system configurations.
        Supports multi-condition filtering with fuzzy search on config_name and config_value.
      operationId: listSysConfigs
      parameters:
        - name: configName
          in: query
