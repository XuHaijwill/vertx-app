openapi: 3.0.3
info:
  title: My Vert.x REST API
  description: |
    A reactive, enterprise-grade REST API built with Eclipse Vert.x 5.x
    
    ## Features
    - **RESTful API** - Clean, structured endpoints
    - **PostgreSQL** - Reactive database operations
    - **Health Checks** - Kubernetes-ready probes
    - **Swagger UI** - Interactive API documentation
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8888
    description: Local development server

tags:
  - name: Health
    description: Health check endpoints
  - name: Users
    description: User management operations
  - name: Products
    description: Product management operations
  - name: Orders
    description: Order management with multi-table transactions
  - name: Payments
    description: Payment processing with 5-table ACID transactions
  - name: SysConfig
    description: System configuration management operations
  - name: Auth
    description: Authentication and authorization endpoints

paths:
  # ================================================================
  # AUTH ENDPOINTS
  # ================================================================
  /api/auth/config:
    get:
      tags:
        - Auth
      summary: Get Keycloak client config
      description: Returns public Keycloak configuration for frontend initialization (no secrets exposed)
      operationId: getAuthConfig
      responses:
        '200':
          description: Keycloak public configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: success
                data:
                  enabled: true
                  realm: myrealm
                  clientId: vertx-app
                  authServerUrl: http://localhost:8180

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      description: Returns the current authenticated user info extracted from the JWT Bearer token
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: success
                data:
                  authenticated: true
                  username: john.doe
                  roles:
                    - user
                    - realm:user
                  email: john@example.com
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Get logout URL
      description: Returns the Keycloak logout URL for the frontend to redirect to
      operationId: authLogout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                redirect_uri:
                  type: string
                  description: URL to redirect after logout
                  example: http://localhost:3000
      responses:
        '200':
          description: Logout URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ================================================================
  # HEALTH ENDPOINTS
  # ================================================================
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the full health status of the application
      operationId: getHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                code: success
                message: Operation successful
                data:
                  status: UP
                  service: my-vertx-app
                  version: 1.0.0
                  timestamp: 1714112345678
                  uptime: 5m 32s
                  memory:
                    total: 512MB
                    used: 234MB
                    free: 278MB
                    percentage: 45.7%

  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Kubernetes liveness probe - returns OK if the application is running
      operationId: getLiveness
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: OK

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Kubernetes readiness probe - returns READY if the application is ready to serve traffic
      operationId: getReadiness
      responses:
        '200':
          description: Readiness status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: success
                data:
                  status: READY

  # ================================================================
  # USER ENDPOINTS
  # ================================================================
  /api/users:
    get:
      tags:
        - Users
      summary: List all users
      description: Returns a list of all users in the system
      operationId: listUsers
      parameters:
        - name: q
          in: query
          description: Search keyword (searches name, email, department)
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponse'
              example:
                code: success
                message: Operation successful
                data:
                  - id: 1
                    name: Alice
                    email: alice@example.com
                    age: 28
                    department: Engineering
                    status: active
                    created_at: "2026-04-26T00:00:00Z"
                  - id: 2
                    name: Bob
                    email: bob@example.com
                    age: 32
                    department: Product
                    status: active
                    created_at: "2026-04-26T00:00:00Z"
    post:
      tags:
        - Users
      summary: Create a new user
      description: Creates a new user with the provided information
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              name: John Doe
              email: john@example.com
              age: 30
              department: Engineering
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Returns a single user by their ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Users
      summary: Update user
      description: Updates an existing user with the provided information
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              name: Alice Smith
              age: 29
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Users
      summary: Delete user
      description: Deletes a user by their ID
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ================================================================
  # PRODUCT ENDPOINTS
  # ================================================================
  /api/products:
    get:
      tags:
        - Products
      summary: List all products
      description: Returns a list of all products
      operationId: listProducts
      parameters:
        - name: q
          in: query
          description: Search keyword
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsResponse'
              example:
                code: success
                data:
                  - id: 1
                    name: iPhone 15
                    category: Electronics
                    price: 799.99
                    stock: 100
                    status: active
                    description: Apple smartphone
                  - id: 2
                    name: MacBook Pro
                    category: Electronics
                    price: 1999.99
                    stock: 50
                    status: active
                    description: Apple laptop
    post:
      tags:
        - Products
      summary: Create a new product
      description: Creates a new product with the provided information
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            example:
              name: iPad Pro
              category: Electronics
              price: 999.99
              stock: 75
              description: Apple tablet
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Products
      summary: Update product
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Products
      summary: Delete product
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ================================================================
  # ORDER ENDPOINTS
  # ================================================================
  /api/orders:
    get:
      tags:
        - Orders
      summary: List orders
      description: Returns a paginated list of all orders
      operationId: listOrders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersResponse'
    post:
      tags:
        - Orders
      summary: Create a new order
      description: |
        Creates a new order with multiple items — all-or-nothing transaction.
        Within one transaction: validates user, inserts order, inserts items, deducts stock.
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              userId: 1
              remark: "Please ship ASAP"
              items:
                - productId: 1
                  quantity: 2
                  price: 99.9
                - productId: 3
                  quantity: 1
                  price: 49.9
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
              example:
                code: success
                data:
                  id: 42
                  userId: 1
                  total: 249.7
                  remark: "Please ship ASAP"
                  status: pending
                  itemCount: 2
        '400':
          description: Validation error (missing userId, empty items, invalid quantity)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Returns a single order by its ID
      operationId: getOrderById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{id}/cancel:
    put:
      tags:
        - Orders
      summary: Cancel order
      description: |
        Cancels an order and restores stock — all-or-nothing transaction.
        Only pending or paid orders can be cancelled. Completed orders cannot be cancelled.
        Uses SELECT ... FOR UPDATE inside the transaction to prevent TOCTOU race conditions.
      operationId: cancelOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                code: success
                data:
                  id: 42
                  userId: 1
                  total: "249.70"
                  status: cancelled
        '409':
          description: Order already cancelled or cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: CONFLICT
                message: Order already cancelled
        '400':
          description: Cannot cancel order in current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/user/{userId}:
    get:
      tags:
        - Orders
      summary: Get orders by user ID
      description: Returns all orders placed by a specific user
      operationId: listOrdersByUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersResponse'

  # ================================================================
  # PAYMENT ENDPOINTS
  # ================================================================
  /api/payments/pay:
    post:
      tags:
        - Payments
      summary: Process payment for an order
      description: |
        Processes payment for an order — 5-table ACID transaction.
        Idempotent: if the order already has a completed payment, returns the existing record.
        Supports methods: balance, card, alipay, wechat
      operationId: processPayment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessPaymentRequest'
            example:
              orderId: 42
              method: balance
      responses:
        '201':
          description: Payment processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
              example:
                code: success
                data:
                  id: 7
                  orderId: 42
                  userId: 1
                  amount: "249.70"
                  method: balance
                  status: completed
                  completedAt: "2026-04-30T09:30:00"
                  orderTotal: "249.70"
                  orderStatus: completed
                  userName: John Doe
                  _idempotent: false
        '400':
          description: Validation error or cannot pay cancelled order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Order already paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/{id}/refund:
    post:
      tags:
        - Payments
      summary: Refund a payment
      description: |
        Refunds a completed payment — 4-table ACID transaction.
        Restores user balance, updates payment and order status.
        Idempotent: returns existing refund if already processed.
      operationId: refundPayment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment refunded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Can only refund completed payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments:
    get:
      tags:
        - Payments
      summary: List payments by status
      description: |
        Returns payments filtered by status. Default is pending.
        Common statuses: pending, completed, failed, refunded
      operationId: listPayments
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by payment status
          required: false
          schema:
            type: string
            enum: [pending, completed, failed, refunded]
            default: pending
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentsResponse'

  /api/payments/{id}:
    get:
      tags:
        - Payments
      summary: Get payment by ID
      description: Returns a single payment by its ID
      operationId: getPaymentById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/order/{orderId}:
    get:
      tags:
        - Payments
      summary: Get payment by order ID
      description: Returns the payment record for a specific order
      operationId: getPaymentByOrderId
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          description: Order ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          description: No payment found for this order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/user/{userId}:
    get:
      tags:
        - Payments
      summary: Get payments by user ID
      description: Returns all payments made by a specific user
      operationId: listPaymentsByUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentsResponse'

  # ================================================================
  # SYS_CONFIG ENDPOINTS
  # ================================================================
  /api/sys-configs:
    get:
      tags:
        - SysConfig
      summary: List system configurations
      description: |
        Returns a paginated list of system configurations.
        Supports multi-condition filtering with fuzzy search on config_name and config_value.
      operationId: listSysConfigs
      parameters:
        - name: configName
          in: query
          description: Filter by config_name (fuzzy search, case-insensitive)
          required: false
          schema:
            type: string
          example: skin
        - name: configValue
          in: query
          description: Filter by config_value (fuzzy search, case-insensitive)
          required: false
          schema:
            type: string
          example: blue
        - name: configKey
          in: query
          description: Filter by config_key (exact match)
          required: false
          schema:
            type: string
          example: sys.index.skinName
        - name: configType
          in: query
          description: Filter by config_type (Y=system built-in, N=user-defined)
          required: false
          schema:
            type: string
            enum: [Y, N]
        - name: page
          in: query
          description: Page number (1-based)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of system configurations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysConfigsResponse'
              example:
                code: success
                message: Operation successful
                data:
                  items:
                    - config_id: 1
                      config_name: Default skin name for main layout
                      config_key: sys.index.skinName
                      config_value: skin-blue
                      config_type: Y
                      create_by: admin
                      create_time: "2026-04-26T00:00:00"
                      remark: Default skins blue skin-blue, green skin-green, purple skin-purple, red skin-red, yellow skin-yellow
                    - config_id: 2
                      config_name: User management - initial password
                      config_key: sys.user.initPassword
                      config_value: "123456"
                      config_type: Y
                      create_by: admin
                      create_time: "2026-04-26T00:00:00"
                      remark: Initial password 123456
                  total: 9
                  page: 1
                  size: 20

  /api/sys-configs/{id}:
    get:
      tags:
        - SysConfig
      summary: Get configuration by ID
      description: Returns a single system configuration by its config_id
      operationId: getSysConfigById
      parameters:
        - name: id
          in: path
          required: true
          description: Configuration ID
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Configuration found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysConfigResponse'
              example:
                code: success
                data:
                  config_id: 1
                  config_name: Default skin name for main layout
                  config_key: sys.index.skinName
                  config_value: skin-blue
                  config_type: Y
                  create_by: admin
                  create_time: "2026-04-26T00:00:00"
                  update_by: ""
                  update_time: null
                  remark: Default skins blue skin-blue, green skin-green, purple skin-purple, red skin-red, yellow skin-yellow
        '404':
          description: Configuration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: NOT_FOUND
                message: Config not found 999

  /api/sys-configs/key/{configKey}:
    get:
      tags:
        - SysConfig
      summary: Get configuration by key
      description: Returns a single system configuration by its config_key (exact match)
      operationId: getSysConfigByKey
      parameters:
        - name: configKey
          in: path
          required: true
          description: Configuration key
          schema:
            type: string
          example: sys.user.initPassword
      responses:
        '200':
          description: Configuration found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysConfigResponse'
              example:
                code: success
                data:
                  config_id: 2
                  config_name: User management - initial password
                  config_key: sys.user.initPassword
                  config_value: "123456"
                  config_type: Y
        '404':
          description: Configuration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ================================================================
  # INFO ENDPOINT
  # ================================================================
  /api/info:
    get:
      tags:
        - Info
      summary: API info
      description: Returns basic information about the API
      operationId: getApiInfo
      responses:
        '200':
          description: API information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

# ================================================================
# COMPONENTS
# ================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Keycloak JWT access token. Obtain from http://localhost:8180/realms/myrealm/protocol/openid-connect/token"
  schemas:
    # Base schemas
    ApiResponse:
      type: object
      properties:
        code:
          type: string
          example: success
        message:
          type: string
          example: Operation successful
        data:
          type: object
        timestamp:
          type: integer
          format: int64

    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                status:
                  type: string
                  example: UP
                service:
                  type: string
                  example: my-vertx-app
                version:
                  type: string
                  example: 1.0.0
                timestamp:
                  type: integer
                  format: int64
                uptime:
                  type: string
                  example: 5m 32s
                memory:
                  type: object

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: User not found
        timestamp:
          type: integer
          format: int64

    InfoResponse:
      type: object
      properties:
        code:
          type: string
        data:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
            java:
              type: string
            timestamp:
              type: integer
              format: int64

    # User schemas
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com
        age:
          type: integer
          example: 28
        department:
          type: string
          example: Engineering
        status:
          type: string
          enum: [active, inactive]
          example: active
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        age:
          type: integer
          minimum: 0
          maximum: 150
          example: 30
        department:
          type: string
          maxLength: 100
          example: Engineering

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        age:
          type: integer
          minimum: 0
          maximum: 150
        department:
          type: string
          maxLength: 100
        status:
          type: string
          enum: [active, inactive]

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/User'

    UsersResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/User'

    # Product schemas
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: iPhone 15
        category:
          type: string
          example: Electronics
        price:
          type: number
          format: decimal
          example: 799.99
        stock:
          type: integer
          example: 100
        description:
          type: string
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          maxLength: 200
          example: iPad Pro
        category:
          type: string
          example: Electronics
        price:
          type: number
          format: decimal
          minimum: 0.01
          example: 999.99
        stock:
          type: integer
          minimum: 0
          example: 75
        description:
          type: string
          example: Apple tablet

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        category:
          type: string
        price:
          type: number
          format: decimal
          minimum: 0.01
        stock:
          type: integer
          minimum: 0
        description:
          type: string
        status:
          type: string
          enum: [active, inactive]

    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Product'

    ProductsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Product'

    # SysConfig schemas
    SysConfig:
      type: object
      properties:
        config_id:
          type: integer
          format: int64
          description: Configuration ID
          example: 1
        config_name:
          type: string
          description: Configuration name/description
          example: Default skin name for main layout
        config_key:
          type: string
          description: Configuration key (unique identifier)
          example: sys.index.skinName
        config_value:
          type: string
          description: Configuration value
          example: skin-blue
        config_type:
          type: string
          description: Configuration type (Y=system built-in, N=user-defined)
          enum: [Y, N]
          example: Y
        create_by:
          type: string
          description: Creator username
          example: admin
        create_time:
          type: string
          format: date-time
          description: Creation timestamp
        update_by:
          type: string
          description: Last updater username
          example: ""
        update_time:
          type: string
          format: date-time
          nullable: true
          description: Last update timestamp
        remark:
          type: string
          nullable: true
          description: Configuration description/notes
          example: Default skins blue skin-blue, green skin-green, purple skin-purple, red skin-red, yellow skin-yellow

    PageResultSysConfig:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SysConfig'
        total:
          type: integer
          format: int64
          description: Total number of matching records
          example: 9
        page:
          type: integer
          description: Current page number
          example: 1
        size:
          type: integer
          description: Page size
          example: 20

    SysConfigResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SysConfig'

    # Order schemas
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        order_id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int64
        quantity:
          type: integer
        price:
          type: string
          description: Price as decimal string
        created_at:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending, paid, completed, cancelled, refunded]
        total:
          type: string
          description: Order total as decimal string
        remark:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateOrderItemRequest:
      type: object
      required:
        - productId
        - quantity
        - price
      properties:
        productId:
          type: integer
          format: int64
          description: Product ID
        quantity:
          type: integer
          minimum: 1
          description: Quantity to order
        price:
          type: number
          format: double
          minimum: 0.01
          description: Price per unit at time of order

    CreateOrderRequest:
      type: object
      required:
        - userId
        - items
      properties:
        userId:
          type: integer
          format: int64
          description: User placing the order
        remark:
          type: string
          description: Order remark/notes
          example: "Please ship ASAP"
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'

    OrderCreateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                id:
                  type: integer
                  format: int64
                userId:
                  type: integer
                  format: int64
                total:
                  type: number
                remark:
                  type: string
                status:
                  type: string
                itemCount:
                  type: integer

    OrderResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Order'

    OrdersResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Order'

    # Payment schemas
    Payment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        order_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        amount:
          type: string
          description: Payment amount as decimal string
        method:
          type: string
          enum: [balance, card, alipay, wechat]
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        transaction_no:
          type: string
          nullable: true
        remark:
          type: string
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        # Enriched fields (from JOINs)
        orderTotal:
          type: string
          nullable: true
        orderStatus:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
        _idempotent:
          type: boolean
          description: Whether this was an idempotent return (payment already existed)

    ProcessPaymentRequest:
      type: object
      required:
        - orderId
      properties:
        orderId:
          type: integer
          format: int64
          description: Order ID to pay for
        method:
          type: string
          enum: [balance, card, alipay, wechat]
          default: balance
          description: Payment method

    PaymentResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Payment'

    PaymentsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Payment'

    SysConfigsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PageResultSysConfig'
