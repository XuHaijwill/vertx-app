    # ================================================================
    BatchInsertOrderItemsRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productId
              - quantity
              - price
            properties:
              productId:
                type: integer
                format: int64
              quantity:
                type: integer
                minimum: 1
              price:
                type: number
                format: double

    BatchUpdateOrderStatusRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - id
              - status
            properties:
              id:
                type: integer
                format: int64
              status:
                type: string
                enum: [pending, paid, completed, cancelled, refunded]

    BatchStockDeductRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productId
              - quantity
            properties:
              productId:
                type: integer
                format: int64
              quantity:
                type: integer
                minimum: 1

    BatchStockRestoreRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productId
              - quantity
            properties:
              productId:
                type: integer
                format: int64
              quantity:
                type: integer
                minimum: 1
