      summary: Batch update order statuses
      description: |
        Batch update order statuses in a single database round-trip.
        Uses Vert.x SQL Client's executeBatch() for high performance.
      operationId: batchUpdateOrderStatus
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUpdateOrderStatusRequest'
      responses:
        '200':
          description: Orders updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/batch/products/stock/deduct:
    post:
      tags:
        - Batch
      summary: Batch deduct product stock
      description: |
        Batch deduct product stock — single round-trip for multiple products.
        Uses executeBatch() for performance.
      operationId: batchDeductStock
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchStockDeductRequest'
      responses:
        '200':
          description: Stock deducted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/batch/products/stock/restore:
    post:
      tags:
        - Batch
      summary: Batch restore product stock
      description: |
        Batch restore product stock — single round-trip for multiple products.
        Used for order cancellation rollback.
      operationId: batchRestoreStock
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchStockRestoreRequest'
      responses:
        '200':
          description: Stock restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

# ================================================================
# COMPONENTS
# ================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Keycloak JWT access token. Obtain from http://localhost:8180/realms/myrealm/protocol/openid-connect/token"
  schemas:
    # Base schemas
    ApiResponse:
      type: object
      properties:
        code:
          type: string
          example: success
        message:
          type: string
          example: Operation successful
        data:
          type: object
        timestamp:
          type: integer
          format: int64

    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                status:
                  type: string
                  example: UP
                service:
                  type: string
                  example: my-vertx-app
                version:
                  type: string
                  example: 1.0.0
                timestamp:
                  type: integer
                  format: int64
                uptime:
                  type: string
                  example: 5m 32s
                memory:
                  type: object

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: User not found
        timestamp:
          type: integer
          format: int64


    # ================================================================
    # BATCH OPERATION SCHEMAS
    # ================================================================
    BatchCreateProductsRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required:
              - name
              - price
            properties:
              name:
                type: string
                maxLength: 200
              category:
                type: string
              price:
                type: number
                format: decimal
                minimum: 0.01
              stock:
                type: integer
                minimum: 0
              description:
                type: string

    BatchUpdateProductsRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required:
              - id
            properties:
              id:
                type: integer
                format: int64
              name:
                type: string
                maxLength: 200
              category:
                type: string
              price:
                type: number
                format: decimal
                minimum: 0.01
              stock:
                type: integer
                minimum: 0
              description:
                type: string
              status:
                type: string
                enum: [active, inactive]

    BatchCreateUsersRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required:
              - name
              - email
            properties:
              name:
                type: string
                minLength: 2
                maxLength: 100
              email:
                type: string
                format: email
              age:
                type: integer
                minimum: 0
                maximum: 150
              department:
                type: string
                maxLength: 100

    BatchUpdateUsersRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required:
              - id
            properties:
              id:
                type: integer
                format: int64
              name:
                type: string
                minLength: 2
                maxLength: 100
              email:
                type: string
                format: email
              age:
                type: integer
                minimum: 0
                maximum: 150
              department:
                type: string
                maxLength: 100
              status:
                type: string
                enum: [active, inactive]

    BatchDeleteRequest:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: integer
            format: int64

    BatchOperationResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                createdCount:
                  type: integer
                  description: Number of items successfully created
                updatedCount:
                  type: integer
                  description: Number of items successfully updated
                failedCount:
                  type: integer
                  description: Number of items that failed
                items:
                  type: array
                  description: Successfully processed items
                  items:
                    type: object
                failedItems:
                  type: array
                  description: Items that failed (for update operations)
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      error:
                        type: string

    BatchDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                deletedCount:
                  type: integer
                  description: Number of items successfully deleted
                failedCount:
                  type: integer
                  description: Number of items that failed

    InfoResponse:
      type: object
      properties:
        code:
          type: string
        data:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
            java:
              type: string
            timestamp:
              type: integer
              format: int64

    # User schemas
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com
        age:
          type: integer
          example: 28
        department:
          type: string
          example: Engineering
        status:
          type: string
          enum: [active, inactive]
          example: active
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        age:
          type: integer
          minimum: 0
          maximum: 150
          example: 30
        department:
          type: string
          maxLength: 100
          example: Engineering

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        age:
          type: integer
          minimum: 0
          maximum: 150
        department:
          type: string
          maxLength: 100
        status:
          type: string
          enum: [active, inactive]

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/User'

    UsersResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/User'

    # Product schemas
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: iPhone 15
        category:
          type: string
          example: Electronics
        price:
          type: number
          format: decimal
          example: 799.99
        stock:
          type: integer
          example: 100
        description:
          type: string
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          maxLength: 200
          example: iPad Pro
        category:
          type: string
          example: Electronics
        price:
          type: number
          format: decimal
          minimum: 0.01
          example: 999.99
        stock:
          type: integer
          minimum: 0
          example: 75
        description:
          type: string
          example: Apple tablet

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        category:
          type: string
        price:
          type: number
          format: decimal
          minimum: 0.01
        stock:
          type: integer
          minimum: 0
        description:
          type: string
        status:
          type: string
          enum: [active, inactive]

    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Product'

    ProductsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Product'

    # SysConfig schemas
    SysConfig:
      type: object
      properties:
        configId:
          type: integer
          format: int64
          description: Configuration ID
          example: 1
        configName:
          type: string
          description: Configuration name/description
          example: Default skin name for main layout
        configKey:
          type: string
          description: Configuration key (unique identifier)
          example: sys.index.skinName
        configValue:
          type: string
          description: Configuration value
          example: skin-blue
        configType:
          type: string
          description: Configuration type (Y=system built-in, N=user-defined)
          enum: [Y, N]
          example: Y
        createBy:
          type: string
          description: Creator username
          example: admin
        createTime:
          type: string
          format: date-time
          description: Creation timestamp
        updateBy:
          type: string
          description: Last updater username
          example: ""
        updateTime:
          type: string
          format: date-time
          nullable: true
          description: Last update timestamp
        remark:
          type: string
          nullable: true
          description: Configuration description/notes
          example: Default skins blue skin-blue, green skin-green, purple skin-purple, red skin-red, yellow skin-yellow

    PageResultSysConfig:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SysConfig'
        total:
          type: integer
          format: int64
          description: Total number of matching records
          example: 9
        page:
          type: integer
          description: Current page number
          example: 1
        size:
          type: integer
          description: Page size
          example: 20

    SysConfigResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SysConfig'

    # Order schemas
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        order_id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int64
        quantity:
          type: integer
        price:
          type: string
          description: Price as decimal string
        created_at:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending, paid, completed, cancelled, refunded]
        total:
          type: string
          description: Order total as decimal string
        remark:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateOrderItemRequest:
      type: object
      required:
        - productId
        - quantity
        - price
      properties:
        productId:
          type: integer
          format: int64
          description: Product ID
        quantity:
          type: integer
          minimum: 1
          description: Quantity to order
        price:
          type: number
          format: double
          minimum: 0.01
          description: Price per unit at time of order

    CreateOrderRequest:
      type: object
      required:
        - userId
        - items
      properties:
        userId:
          type: integer
          format: int64
          description: User placing the order
        remark:
          type: string
          description: Order remark/notes
          example: "Please ship ASAP"
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'

    OrderCreateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                id:
                  type: integer
                  format: int64
                userId:
                  type: integer
                  format: int64
                total:
                  type: number
                remark:
                  type: string
                status:
                  type: string
                itemCount:
                  type: integer

    OrderResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Order'

    OrdersResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Order'

    # Payment schemas
    Payment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        order_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        amount:
          type: string
          description: Payment amount as decimal string
        method:
          type: string
          enum: [balance, card, alipay, wechat]
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        transaction_no:
          type: string
          nullable: true
        remark:
          type: string
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        # Enriched fields (from JOINs)
        orderTotal:
          type: string
          nullable: true
        orderStatus:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
        _idempotent:
          type: boolean
          description: Whether this was an idempotent return (payment already existed)

    ProcessPaymentRequest:
      type: object
      required:
        - orderId
      properties:
        orderId:
          type: integer
          format: int64
          description: Order ID to pay for
        method:
          type: string
          enum: [balance, card, alipay, wechat]
          default: balance
          description: Payment method

    PaymentResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Payment'

    PaymentsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Payment'

    SysConfigsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PageResultSysConfig'

    # ================================================================
    # SYS_DICT_TYPE SCHEMAS
    # ================================================================
    SysDictType:
      type: object
      properties:
        dictId:
          type: integer
          format: int64
          description: Dictionary type ID
          example: 1
        dictName:
          type: string
          description: Dictionary type name
          example: System Status
        dictType:
          type: string
          description: Dictionary type code (unique)
          example: sys_status
        status:
          type: string
          description: Status (0=Normal, 1=Disabled)
          enum: ["0", "1"]
          example: "0"
        createBy:
          type: string
          description: Creator username
          example: admin
        createTime:
          type: string
          format: date-time
          description: Creation timestamp
        updateBy:
          type: string
          description: Last updater username
        updateTime:
          type: string
          format: date-time
          nullable: true
          description: Last update timestamp
        remark:
          type: string
          nullable: true
          description: Dictionary type description/notes
          example: System status dictionary

    CreateDictTypeRequest:
      type: object
      required:
        - dictName
        - dictType
      properties:
        dictName:
          type: string
          minLength: 1
          maxLength: 100
          description: Dictionary type name
          example: System Status
        dictType:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
          description: Dictionary type code (unique, must start with letter)
          example: sys_status
        status:
          type: string
          enum: ["0", "1"]
          default: "0"
          description: Status (0=Normal, 1=Disabled)
        remark:
          type: string
          maxLength: 500
          description: Dictionary type description

    UpdateDictTypeRequest:
      type: object
      properties:
        dictName:
          type: string
          minLength: 1
          maxLength: 100
          description: Dictionary type name
        status:
          type: string
          enum: ["0", "1"]
          description: Status
        remark:
          type: string
          maxLength: 500
          description: Dictionary type description

    SysDictTypeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SysDictType'

    SysDictTypesResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PageResultDictType'

    PageResultDictType:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SysDictType'
        total:
          type: integer
          format: int64
          description: Total number of matching records
          example: 10
        page:
          type: integer
          description: Current page number
          example: 1
        size:
          type: integer
          description: Page size
          example: 20

    # ================================================================
    # SYS_DICT_DATA SCHEMAS
    # ================================================================
    SysDictData:
      type: object
      properties:
        dictCode:
          type: integer
          format: int64
          description: Dictionary data ID
          example: 1
        dictSort:
          type: integer
          description: Sort order
          example: 1
        dictLabel:
          type: string
          description: Dictionary label (display text)
          example: Normal
        dictValue:
          type: string
          description: Dictionary value
          example: "0"
        dictType:
          type: string
          description: Dictionary type code
          example: sys_normal_disable
        cssClass:
          type: string
          nullable: true
          description: CSS class for styling
          example: ""
        listClass:
          type: string
          nullable: true
          description: List table class for styling
          example: primary
        isDefault:
          type: string
          nullable: true
          description: Whether this is the default value (Y/N)
          enum: [Y, N]
          example: Y
        status:
          type: string
          description: Status (0=Normal, 1=Disabled)
          enum: ["0", "1"]
          example: "0"
        createBy:
          type: string
          description: Creator username
          example: admin
        createTime:
          type: string
          format: date-time
          description: Creation timestamp
        updateBy:
          type: string
          description: Last updater username
        updateTime:
          type: string
          format: date-time
          nullable: true
          description: Last update timestamp
        remark:
          type: string
          nullable: true
          description: Dictionary data description
          example: Normal status

    CreateDictDataRequest:
      type: object
      required:
        - dictType
        - dictLabel
        - dictValue
      properties:
        dictType:
          type: string
          description: Dictionary type code
          example: sys_normal_disable
        dictLabel:
          type: string
          minLength: 1
          maxLength: 100
          description: Dictionary label
          example: Normal
        dictValue:
          type: string
          minLength: 1
          maxLength: 100
          description: Dictionary value
          example: "0"
        dictSort:
          type: integer
          minimum: 0
          default: 0
          description: Sort order
        cssClass:
          type: string
          maxLength: 100
          description: CSS class
        listClass:
          type: string
          maxLength: 100
          description: List table class
        isDefault:
          type: string
          enum: [Y, N]
          description: Whether this is the default value
        status:
          type: string
          enum: ["0", "1"]
          default: "0"
          description: Status
        remark:
          type: string
          maxLength: 500
          description: Dictionary data description

    UpdateDictDataRequest:
      type: object
      properties:
        dictLabel:
          type: string
          minLength: 1
          maxLength: 100
          description: Dictionary label
        dictValue:
          type: string
          minLength: 1
          maxLength: 100
          description: Dictionary value
        dictSort:
          type: integer
          minimum: 0
          description: Sort order
        cssClass:
          type: string
          maxLength: 100
          description: CSS class
        listClass:
          type: string
          maxLength: 100
          description: List table class
        isDefault:
          type: string
          enum: [Y, N]
          description: Whether this is the default value
        status:
          type: string
          enum: ["0", "1"]
          description: Status
        remark:
          type: string
          maxLength: 500
          description: Dictionary data description

    SysDictDataResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SysDictData'

    SysDictDataListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/SysDictData'

    # ================================================================
    # SYS_MENU SCHEMAS
    # ================================================================
    SysMenu:
      type: object
      properties:
        menuId:
          type: integer
          format: int64
          description: Menu ID
          example: 1
        menuName:
          type: string
          description: Menu name
          example: System Management
        menuType:
          type: string
          description: Menu type (M=Directory, C=Menu, F=Button)
          enum: [M, C, F]
          example: M
        parentId:
          type: integer
          format: int64
          description: Parent menu ID (0 for root)
          example: 0
        orderNum:
          type: integer
          description: Display order
          example: 1
        path:
          type: string
          nullable: true
          description: Route path
          example: /system
        component:
          type: string
          nullable: true
          description: Component path
          example: ""
        perms:
          type: string
          nullable: true
          description: Permission identifier
          example: ""
        query:
          type: string
          nullable: true
          description: Route query parameter
          example: ""
        routeName:
          type: string
          nullable: true
          description: Route name (for Vue)
          example: System
        isFrame:
          type: string
          description: Whether external link (0=No, 1=Yes)
          enum: ["0", "1"]
          example: "1"
        isCache:
          type: string
          description: Whether cached (0=No, 1=Yes)
          enum: ["0", "1"]
          example: "0"
        status:
          type: string
          description: Status (0=Normal, 1=Disabled)
          enum: ["0", "1"]
          example: "0"
        visible:
          type: string
          description: Whether visible (0=Show, 1=Hide)
          enum: ["0", "1"]
          example: "0"
        icon:
          type: string
          nullable: true
          description: Menu icon
          example: system
        createBy:
          type: string
          description: Creator username
          example: admin
        createTime:
          type: string
          format: date-time
          description: Creation timestamp
        updateBy:
          type: string
          description: Last updater username
        updateTime:
          type: string
          format: date-time
          nullable: true
          description: Last update timestamp
        remark:
          type: string
          nullable: true
          description: Menu description
          example: System management directory
        children:
          type: array
          nullable: true
          description: Child menus (only in tree response)
          items:
            $ref: '#/components/schemas/SysMenu'

    CreateMenuRequest:
      type: object
      required:
        - menuName
        - menuType
        - parentId
      properties:
        menuName:
          type: string
          minLength: 1
          maxLength: 50
          description: Menu name
          example: User Management
        menuType:
          type: string
          enum: [M, C, F]
          description: Menu type (M=Directory, C=Menu, F=Button)
        parentId:
          type: integer
          format: int64
          description: Parent menu ID (0 for root)
          example: 1
        orderNum:
          type: integer
          minimum: 0
          default: 0
          description: Display order
        path:
          type: string
          maxLength: 200
          description: Route path (required for M and C types)
          example: /system/user
        component:
          type: string
          maxLength: 255
          description: Component path (required for C type)
          example: system/user/index
        perms:
          type: string
          maxLength: 100
          description: Permission identifier (required for F type, multiple separated by comma)
          example: system:user:list
        query:
          type: string
          maxLength: 255
          description: Route query parameter
        routeName:
          type: string
          maxLength: 50
          description: Route name (for Vue)
        isFrame:
          type: string
          enum: ["0", "1"]
          default: "0"
          description: Whether external link
        isCache:
          type: string
          enum: ["0", "1"]
          default: "0"
          description: Whether cached
        status:
          type: string
          enum: ["0", "1"]
          default: "0"
          description: Status
        visible:
          type: string
          enum: ["0", "1"]
          default: "0"
          description: Whether visible
        icon:
          type: string
          maxLength: 100
          description: Menu icon
        remark:
          type: string
          maxLength: 500
          description: Menu description

    UpdateMenuRequest:
      type: object
      properties:
        menuName:
          type: string
          minLength: 1
          maxLength: 50
          description: Menu name
        orderNum:
          type: integer
          minimum: 0
          description: Display order
        path:
          type: string
          maxLength: 200
          description: Route path
        component:
          type: string
          maxLength: 255
          description: Component path
        perms:
          type: string
          maxLength: 100
          description: Permission identifier
        query:
          type: string
          maxLength: 255
          description: Route query parameter
        routeName:
          type: string
          maxLength: 50
          description: Route name
        isFrame:
          type: string
          enum: ["0", "1"]
          description: Whether external link
        isCache:
          type: string
          enum: ["0", "1"]
          description: Whether cached
        status:
          type: string
          enum: ["0", "1"]
          description: Status
        visible:
          type: string
          enum: ["0", "1"]
          description: Whether visible
        icon:
          type: string
          maxLength: 100
          description: Menu icon
        remark:
          type: string
          maxLength: 500
          description: Menu description

    SysMenuResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SysMenu'

    SysMenusResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/SysMenu'

    SysMenuTreeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              description: Menu tree structure
              items:
                $ref: '#/components/schemas/SysMenu'

    # ================================================================
    # SCHEDULED TASK SCHEMAS
    # ================================================================
    ScheduledTask:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        task_type:
          type: string
          enum: [HTTP, SQL, CLASS]
        cron_expr:
          type: string
          nullable: true
        http_url:
          type: string
          nullable: true
        http_method:
          type: string
          nullable: true
        sql_query:
          type: string
          nullable: true
        class_name:
          type: string
          nullable: true
        class_method:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, PAUSED]
        last_run_time:
          type: string
          format: date-time
          nullable: true
        last_run_status:
          type: string
          nullable: true
        last_run_result:
          type: string
          nullable: true
        next_run_time:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateScheduledTaskRequest:
      type: object
      required:
        - name
        - task_type
      properties:
        name:
          type: string
        task_type:
          type: string
          enum: [HTTP, SQL, CLASS]
        cron_expr:
          type: string
        http_url:
          type: string
        http_method:
          type: string
          enum: [GET, POST, PUT, DELETE]
        http_headers:
          type: object
        http_body:
          type: string
        sql_query:
          type: string
        class_name:
          type: string
        class_method:
          type: string
        status:
          type: string
          enum: [ACTIVE, PAUSED]
          default: PAUSED

    UpdateScheduledTaskRequest:
      type: object
      properties:
        name:
          type: string
        cron_expr:
          type: string
        http_url:
          type: string
        http_method:
          type: string
        http_headers:
          type: object
        http_body:
          type: string
        sql_query:
          type: string
        class_name:
          type: string
        class_method:
          type: string
        status:
          type: string
          enum: [ACTIVE, PAUSED]

    ScheduledTaskResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ScheduledTask'

    ScheduledTasksResponse:
      allOf:
